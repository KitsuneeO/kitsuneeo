<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All My Links</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: #0a0a1a;
            overflow-x: hidden;
            position: relative;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 25%, #0a1628 50%, #0d1f0d 75%, #0a0a1a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 200, 100, 0.6);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        .particle:nth-child(odd) {
            background: rgba(80, 180, 255, 0.5);
        }

        .particle:nth-child(3n) {
            background: rgba(180, 100, 255, 0.4);
            width: 3px;
            height: 3px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(10px) scale(1);
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) translateX(-20px) scale(0.5);
                opacity: 0;
            }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(76, 175, 80, 0.15);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(33, 150, 243, 0.12);
            top: 60%;
            right: 10%;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(156, 39, 176, 0.1);
            bottom: 10%;
            left: 30%;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            animation: containerFadeIn 1s ease-out;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-wrapper {
            position: relative;
            margin-bottom: 24px;
            animation: profilePop 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.3s both;
        }

        @keyframes profilePop {
            from {
                opacity: 0;
                transform: scale(0.3) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .profile-ring {
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: conic-gradient(
                #4caf50,
                #2196f3,
                #9c27b0,
                #4caf50
            );
            animation: ringRotate 4s linear infinite;
            z-index: -1;
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        .profile-ring::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            border-radius: 50%;
            background: #0a0a1a;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 1;
            transition: transform 0.4s ease;
        }

        .profile-wrapper:hover .profile-pic {
            transform: scale(1.05);
        }

        .profile-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -2;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }

        .title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(135deg, #4caf50, #66bb6a, #81c784, #2196f3);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleSlide 1s ease-out 0.5s both, textShimmer 4s ease infinite;
            letter-spacing: 1px;
        }

        @keyframes titleSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes textShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 36px;
            text-align: center;
            animation: titleSlide 1s ease-out 0.7s both;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .link-card {
            position: relative;
            display: flex;
            align-items: center;
            padding: 18px 24px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Sekcja kolorów dla poszczególnych linków */
        .link-heltec { animation: cardSlideIn 0.6s ease-out 0.9s both; }
        .link-heltec:hover { background: rgba(76, 175, 80, 0.15); border-color: rgba(76, 175, 80, 0.3); box-shadow: 0 20px 40px rgba(76, 175, 80, 0.15); }

        .link-proxy { animation: cardSlideIn 0.6s ease-out 1.1s both; }
        .link-proxy:hover { background: rgba(33, 150, 243, 0.15); border-color: rgba(33, 150, 243, 0.3); box-shadow: 0 20px 40px rgba(33, 150, 243, 0.15); }

        .link-discord { animation: cardSlideIn 0.6s ease-out 1.3s both; }
        .link-discord:hover { background: rgba(114, 137, 218, 0.15); border-color: rgba(114, 137, 218, 0.3); box-shadow: 0 20px 40px rgba(114, 137, 218, 0.15); }

        .link-youtube { animation: cardSlideIn 0.6s ease-out 1.5s both; }
        .link-youtube:hover { background: rgba(255, 0, 0, 0.15); border-color: rgba(255, 0, 0, 0.3); box-shadow: 0 20px 40px rgba(255, 0, 0, 0.15); }

        .link-fluxware { animation: cardSlideIn 0.6s ease-out 1.7s both; }
        .link-fluxware:hover { background: rgba(0, 255, 255, 0.1); border-color: rgba(0, 255, 255, 0.3); box-shadow: 0 20px 40px rgba(0, 255, 255, 0.1); }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .link-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .link-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .link-heltec .link-icon { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .link-proxy .link-icon { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .link-discord .link-icon { background: rgba(114, 137, 218, 0.2); color: #7289da; }
        .link-youtube .link-icon { background: rgba(255, 0, 0, 0.2); color: #ff0000; }
        .link-fluxware .link-icon { background: rgba(255, 255, 255, 0.1); }

        .link-text {
            flex: 1;
        }

        .link-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .link-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
            margin-top: 2px;
        }

        .link-arrow {
            font-size: 18px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            animation: titleSlide 1s ease-out 1.9s both;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        @media (max-width: 500px) {
            .container { padding: 30px 20px; }
            .title { font-size: 26px; }
            .profile-pic { width: 110px; height: 110px; }
            .link-card { padding: 15px 18px; }
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
        }
    </style>
</head>

    <script>
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        const cursorGlow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        const profilePic = document.getElementById('profilePic');
        profilePic.onerror = function() {
            this.src = 'data:image/svg+xml,' + encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" width="130" height="130" viewBox="0 0 130 130">
                    <defs>
                        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4caf50"/>
                            <stop offset="100%" style="stop-color:#2196f3"/>
                        </linearGradient>
                    </defs>
                    <circle cx="65" cy="65" r="65" fill="url(#bg)"/>
                    <text x="65" y="75" text-anchor="middle" fill="white" font-size="40" font-family="Arial" font-weight="bold">K</text>
                </svg>
            `);
        };

        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: absolute;
                    width: 20px;
                    height: 20px;
                    border-radius: 50%;
                    background: rgba(255,255,255,0.3);
                    transform: scale(0);
                    animation: rippleEffect 0.6s ease-out;
                    pointer-events: none;
                    left: ${e.clientX - this.getBoundingClientRect().left}px;
                    top: ${e.clientY - this.getBoundingClientRect().top}px;
                `;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                to {
                    transform: scale(15);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 15;
                const rotateY = (centerX - x) / 15;
                this.style.transform = `translateY(-4px) scale(1.02) perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            card.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
